<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Spier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 12px;
      transition: background 0.25s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }

    .toggle input:checked + .slider {
      background: #16213e;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: #4ecca3;
    }

    /* Status section */
    .section {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e74c3c;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #4ecca3;
    }

    .status-dot.reconnecting {
      background: #f0c040;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .status-dot.disconnected {
      background: #e74c3c;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 13px;
    }

    /* Server address */
    .field-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .address-row {
      display: flex;
      gap: 6px;
    }

    .address-input {
      flex: 1;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .address-input:focus {
      border-color: #4ecca3;
    }

    .save-btn {
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .save-btn:hover {
      opacity: 0.85;
    }

    .save-btn:active {
      opacity: 0.7;
    }

    /* Tab count */
    .tab-count {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tab-count .count {
      font-size: 20px;
      font-weight: 700;
      color: #4ecca3;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Spier</span>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-label">OFF</span>
      <label class="toggle">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="status-row">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Disconnected</span>
    </div>
  </div>

  <div class="section">
    <div class="field-label">Server Address</div>
    <div class="address-row">
      <input type="text" class="address-input" id="address-input" value="localhost:9222">
      <button class="save-btn" id="save-btn">Save</button>
    </div>
  </div>

  <div class="section">
    <div class="tab-count">
      <span>Monitored Tabs</span>
      <span class="count" id="tab-count">0</span>
    </div>
  </div>

  <script src="./main.ts" type="module"></script>
</body>
</html>
